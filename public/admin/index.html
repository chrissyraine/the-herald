<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Herald - Admin</title>
  <style>
    :root {
      --bg: #111827; --surface: #1f2937; --text: #f9fafb; --text-muted: #9ca3af;
      --primary: #3b82f6; --primary-hover: #2563eb; --border: #374151;
      --danger: #ef4444; --success: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg); color: var(--text); margin: 0; padding: 20px;
      line-height: 1.5;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .card {
      background-color: var(--surface); border-radius: 8px; padding: 24px;
      margin-bottom: 24px; border: 1px solid var(--border);
    }
    h1, h2 { margin-top: 0; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-size: 0.875rem; color: var(--text-muted); }
    input, select, textarea {
      width: 100%; padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border);
      background-color: var(--bg); color: var(--text); font-family: inherit;
    }
    button {
      background-color: var(--primary); color: white; border: none; padding: 8px 16px;
      border-radius: 4px; cursor: pointer; font-weight: 500;
    }
    button:hover { background-color: var(--primary-hover); }
    button.danger { background-color: var(--danger); }
    .hidden { display: none; }
    #message { padding: 12px; border-radius: 4px; margin-bottom: 16px; display: none; }
    #message.success { background-color: rgba(16, 185, 129, 0.2); color: var(--success); display: block; }
    #message.error { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); display: block; }
    .post-item {
      padding: 12px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 12px;
    }
    .post-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; }
  </style>
  <!-- Housebooker skin — warm house look. Loaded last. -->
  <link rel="stylesheet" href="/admin/hb-skin.css">
</head>
<body>
  <div class="container">
    <h1>The Herald</h1>
    <div id="message"></div>

    <!-- Login Form -->
    <div id="loginSection" class="card">
      <h2>Business Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Business Slug</label>
          <input type="text" id="loginSlug" required>
        </div>
        <div class="form-group">
          <label>PIN</label>
          <input type="password" id="loginPin" value="admin" required>
        </div>
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="hidden">
      <div class="card">
        <h2 id="businessName">Dashboard</h2>
        <button id="logoutBtn" style="background: transparent; border: 1px solid var(--border); margin-bottom: 16px;">Logout</button>
        
        <form id="postForm">
          <div class="form-group">
            <label>Type</label>
            <select id="postType" required>
              <option value="announcement">Announcement</option>
              <option value="event">Event</option>
              <option value="special">Daily Special</option>
            </select>
          </div>
          <div class="form-group">
            <label>Title (Optional)</label>
            <input type="text" id="postTitle">
          </div>
          <div class="form-group">
            <label>Content</label>
            <textarea id="postContent" rows="4" required></textarea>
          </div>
          <div class="form-group">
            <label>Link URL (Optional)</label>
            <input type="url" id="postLink">
          </div>
          <div class="form-group">
            <label>Expires At (Optional for Events/Specials)</label>
            <input type="datetime-local" id="postExpires">
          </div>
          <button type="submit">Publish Update</button>
        </form>
      </div>

      <div class="card">
        <h2>Active Posts</h2>
        <div id="postsList">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('herald_token');
    let currentSlug = localStorage.getItem('herald_slug');

    const ui = {
      login: document.getElementById('loginSection'),
      dash: document.getElementById('dashboardSection'),
      msg: document.getElementById('message'),
      posts: document.getElementById('postsList'),
      bizName: document.getElementById('businessName')
    };

    function showMsg(text, isError = false) {
      ui.msg.textContent = text;
      ui.msg.className = isError ? 'error' : 'success';
      setTimeout(() => ui.msg.className = '', 3000);
    }

    function checkAuth() {
      if (token && currentSlug) {
        ui.login.classList.add('hidden');
        ui.dash.classList.remove('hidden');
        ui.bizName.textContent = currentSlug.toUpperCase();
        loadPosts();
      } else {
        ui.login.classList.remove('hidden');
        ui.dash.classList.add('hidden');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const slug = document.getElementById('loginSlug').value;
      const pin = document.getElementById('loginPin').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, pin })
        });
        const data = await res.json();
        
        if (data.token) {
          token = data.token;
          currentSlug = slug;
          localStorage.setItem('herald_token', token);
          localStorage.setItem('herald_slug', slug);
          showMsg('Logged in successfully');
          checkAuth();
        } else {
          showMsg(data.error || 'Login failed', true);
        }
      } catch (err) {
        showMsg('Network error', true);
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      token = null; currentSlug = null;
      localStorage.removeItem('herald_token');
      localStorage.removeItem('herald_slug');
      checkAuth();
    });

    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        type: document.getElementById('postType').value,
        title: document.getElementById('postTitle').value,
        content: document.getElementById('postContent').value,
        link_url: document.getElementById('postLink').value,
        expires_at: document.getElementById('postExpires').value ? new Date(document.getElementById('postExpires').value).toISOString() : null
      };

      try {
        const res = await fetch(`/api/businesses/${currentSlug}/posts`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          showMsg('Post published!');
          document.getElementById('postForm').reset();
          loadPosts();
        } else {
          showMsg(data.error || 'Failed to post', true);
        }
      } catch (err) {
        showMsg('Network error', true);
      }
    });

    async function loadPosts() {
      ui.posts.innerHTML = 'Loading...';
      try {
        const res = await fetch(`/api/public/businesses/${currentSlug}/posts`);
        const data = await res.json();
        
        if (data.posts && data.posts.length > 0) {
          ui.posts.innerHTML = data.posts.map(p => `
            <div class="post-item">
              <div class="post-meta">
                <span><strong style="text-transform:uppercase;color:var(--primary)">${p.type}</strong> ${p.title ? `- ${p.title}` : ''}</span>
                <button class="danger" onclick="deletePost(${p.id})">Delete</button>
              </div>
              <p style="margin: 8px 0;">${p.content}</p>
              ${p.expires_at ? `<div class="post-meta">Expires: ${new Date(p.expires_at).toLocaleString()}</div>` : ''}
            </div>
          `).join('');
        } else {
          ui.posts.innerHTML = '<div class="post-meta">No active posts.</div>';
        }
      } catch (err) {
        ui.posts.innerHTML = '<div class="error">Failed to load posts</div>';
      }
    }

    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      try {
        const res = await fetch(`/api/businesses/${currentSlug}/posts/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          showMsg('Post deleted');
          loadPosts();
        }
      } catch (err) {
        showMsg('Network error', true);
      }
    }

    checkAuth();
  </script>
</body>
</html>
